name: CI/CD with uv

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup uv with caching enabled
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      # 2. Fast dependency sync
      - name: Install dependencies
        run: uv sync --frozen

      # 3. DevSecOps: Security scan (Snyk)
      - name: Generate requirements.txt
        run: uv export --format requirements-txt > requirements.txt

      # Force a standard pip install so Snyk can actually "see" the packages
      - name: Install dependencies for Snyk
        run: pip install -r requirements.txt

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Run Snyk to check for vulnerabilities
        run: snyk test --file=requirements.txt --package-manager=pip
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
          
      # 4. Build and Push Docker Image
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cricket-analytics-core:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cricket-analytics-core:latest