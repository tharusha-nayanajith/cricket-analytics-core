name: CI/CD with uv

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup uv with caching enabled
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      # 2. Fast dependency sync
      - name: Install dependencies
        run: uv sync --frozen

     
          
      # 4. Build and Push Docker Image
      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cricket-analytics-core:latest .

      # Replace Snyk with Trivy (No tokens required!)
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        continue-on-error: true
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/cricket-analytics-core:latest'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/cricket-analytics-core:latest